<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drik demo — Sign in</title>
  <style>
    body { font-family: sans-serif; margin: 0; min-height: 100vh; display: flex;
           align-items: center; justify-content: center; background: #f3f4f6; }
    .card { background: #fff; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 320px; }
    h1 { margin: 0 0 24px; }
    input { display: block; width: 100%; padding: 12px; margin: 8px 0;
            font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; font-size: 18px; background: #2563eb;
             color: #fff; border: 0; border-radius: 8px; cursor: pointer; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Sign in</h1>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="document.getElementById('card').innerHTML =
      '<h1>Welcome, Krishna 🎉</h1><p>Your dashboard is ready.</p>'">Sign in</button>
  </div>
</body>
</html>
